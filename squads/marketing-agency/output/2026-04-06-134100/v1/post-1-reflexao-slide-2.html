<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Inter:wght@400;500;700;800&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1080px; height: 1440px; overflow: hidden; background: #070B14; }
    
    .glass-card {
      background: rgba(13, 30, 58, 0.4);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(59, 130, 246, 0.2);
      border-radius: 32px;
      padding: 60px;
    }
  </style>
</head>
<body>
<div style="width:1080px;height:1440px;background:radial-gradient(circle at bottom left, #1E3A8A 0%, #070B14 40%);color:#E2E8F0;font-family:'Inter',sans-serif;display:flex;flex-direction:column;padding:72px;position:relative;overflow:hidden; justify-content: center;">
  
  <div style="position: absolute; top: 0; right: 0; width: 600px; height: 600px; background: #10B981; filter: blur(350px); opacity: 0.1;"></div>

  <div style="margin-bottom:auto; display:flex; gap: 20px; align-items:center;">
    <div style="font-family:'Montserrat',sans-serif; font-weight:900; font-size:32px; color:#fff;">URBAN AI</div>
    <div style="height: 2px; width: 60px; background: #3B82F6;"></div>
  </div>

  <div class="glass-card" style="margin-top: -100px;">
    <div style="font-size:32px;line-height:1.45;font-weight:700;text-transform:uppercase;letter-spacing:4px;color:#94A3B8;margin-bottom:40px;display:flex;align-items:center;gap:15px;">
      <span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:#F87171;"></span>
      Sexta-feira, 19h (Evento Local)
    </div>

    <div style="font-size:55px;line-height:1.3;font-weight:700;font-family:'Inter', sans-serif;">
      A demanda saltou. Os anfitriões vizinhos estão faturando <span style="color:#10B981; font-weight:900; font-family:'Montserrat',sans-serif; border-bottom: 4px solid #10B981;">R$ 510</span>.
    </div>

    <div style="font-size:45px;line-height:1.45;font-weight:600;color:#F87171;margin-top:60px; border-left: 8px solid #F87171; padding-left: 30px;">
      A sua "casa lotada" virou prejuízo silencioso.
    </div>
  </div>

  <div style="margin-top:auto; display:flex; justify-content: space-between; align-items:center;">
    <div style="color:#64748b; font-size: 24px; font-weight: 500;">O erro letal do aluguel &rarr;</div>
    <div style="color:#64748b; font-size: 24px; font-weight: 500;">02/03</div>
  </div>

</div>
</body>
</html>
