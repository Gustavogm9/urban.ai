<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;700&family=Montserrat:wght@800;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1080px; height: 1440px; overflow: hidden; }
  </style>
</head>
<body>
<div style="width:1080px;height:1440px;background:linear-gradient(160deg,#0B1120,#1E1B4B 40%,#090E17);color:#fff;font-family:'Inter',sans-serif;display:flex;flex-direction:column;padding:72px;position:relative;overflow:hidden;">
  <!-- Glow effects -->
  <div style="position:absolute;top:-120px;right:-120px;width:480px;height:480px;background:radial-gradient(circle,#6366F133,transparent 70%);pointer-events:none;"></div>
  <div style="position:absolute;bottom:-100px;left:-100px;width:400px;height:400px;background:radial-gradient(circle,#10B98122,transparent 70%);pointer-events:none;"></div>
  <!-- Tag + Title -->
  <div style="position:relative;z-index:1;">
    <div style="display:inline-block;background:#3B82F633;border-radius:8px;padding:8px 20px;font-size:24px;color:#60A5FA;font-weight:800;text-transform:uppercase;letter-spacing:3px;margin-bottom:28px;">Resultados Reais</div>
    <h1 style="font-size:52px;font-weight:900;line-height:1.2;margin:0 0 24px 0;font-family:'Montserrat',sans-serif;">
      O impacto da <span style="background:linear-gradient(90deg,#60A5FA,#818CF8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">precificação inteligente</span> no RevPAR
    </h1>
    <p style="font-size:34px;color:#94A3B8;line-height:1.55;margin:0;font-weight:500;letter-spacing:0.01em;">Dados analisados de propriedades parceiras após a implementação da automação de tarifas pela Urban AI.</p>
  </div>
  <!-- Data cards -->
  <div style="position:relative;z-index:1;display:flex;flex-direction:column;gap:16px;margin:40px 0;flex:1;justify-content:center;">
    <div style="background:#ffffff05;border:1px solid #ffffff10;border-radius:16px;padding:28px 32px;display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:28px;color:#94A3B8;font-weight:500;">Aumento na Receita</span>
      <span style="font-size:40px;font-weight:800;color:#10B981;font-family:'Montserrat',sans-serif;">+28.4%</span>
    </div>
    <div style="background:#ffffff05;border:1px solid #ffffff10;border-radius:16px;padding:28px 32px;display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:28px;color:#94A3B8;font-weight:500;">Taxa de Ocupação</span>
      <span style="font-size:40px;font-weight:800;color:#60A5FA;font-family:'Montserrat',sans-serif;">84%</span>
    </div>
    <div style="background:#ffffff05;border:1px solid #ffffff10;border-radius:16px;padding:28px 32px;display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:28px;color:#94A3B8;font-weight:500;">Tempo Economizado (mês)</span>
      <span style="font-size:40px;font-weight:800;color:#818CF8;font-family:'Montserrat',sans-serif;">42h</span>
    </div>
    <div style="background:#ffffff05;border:1px solid #ffffff10;border-radius:16px;padding:28px 32px;display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:28px;color:#94A3B8;font-weight:500;">Imóveis Gerenciados</span>
      <span style="font-size:40px;font-weight:800;color:#F472B6;font-family:'Montserrat',sans-serif;">150+</span>
    </div>
  </div>
  <!-- Footer -->
  <div style="position:relative;z-index:1;display:flex;align-items:center;gap:20px;padding-top:24px;border-top:1px solid #ffffff12;">
    <div style="width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#3B82F6,#818CF8);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;">U</div>
    <span style="font-size:24px;color:#94A3B8;">@urban_ai</span>
    <span style="margin-left:auto;font-size:24px;color:#64748B;">ARRASTE →</span>
  </div>
</div>
</body>
</html>
