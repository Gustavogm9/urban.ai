name: Gestor de Roadmap Automático
code: roadmap-manager
purpose: Automatizar o controle de roadmap, auditar o código entregue e gerar documentação técnica atualizada
domain: Product Management e Documentation
trigger: Rodar toda segunda-feira as 09h e sempre que uma sprint ou tarefa chave for fechada

output:
  format: markdown and docx
  type: files
  storage: squads/roadmap-manager/output/

agents:
  - id: vitor-verificador
    name: Vitor Verificador
    role: Auditor de Código
  - id: ricardo-roadmap
    name: Ricardo Roadmap
    role: Gestor de Roadmap
  - id: daniela-documentacao
    name: Daniela Documentação
    role: Technical Writer
  - id: rute-revisao
    name: Rute Revisão
    role: Analista de Qualidade e Revisora

pipeline:
  type: linear
  steps: 6
  max_iterations: 1
