name: marketing-agency
description: Agência de marketing 360º automatizada, capaz de conduzir pesquisa de mercado, estratégia de conteúdo, identidade visual, web analytics, otimização de conversão e programação frontend da Landing Page/Plataforma.
purpose: Elevar a Urban AI do lançamento "zero" até tração orgânica/paga consistente, gerando materiais completos para funil (postagens, LPs ativas, análise de concorrentes e experimentos A/B consolidados).

roles:
  - id: aline-analise
    name: Aline Análise
    role: Pesquisadora de Mercado e Especialista em ICP
    responsibilities: Monitorar comportamento de anfitriões, garimpar PriceLabs e concorrentes, traçar features valorizadas e direcionar o tom de voz do produto baseado em dados de engajamento do nicho.

  - id: samanta-seo
    name: Samanta SEO
    role: Estrategista de Conteúdo e SEO
    responsibilities: Traduzir dados da Aline em calendários editoriais (Youtube, Instagram, Blog), definir pautas quentes de palavras-chave, arquitetar a hierarquia copy/landing page focado em conversão web.

  - id: carlos-copy
    name: Carlos Copy
    role: Redator Publicitário Master
    responsibilities: Desenvolver copys agressivas para Vendas, legendas de redes sociais retentivas, scripts de vídeos, e-mail marketing, aplicando neuromarketing e gatilhos de dor/solução em precificação dinâmica.

  - id: diogo-design
    name: Diogo Design
    role: Head de Identidade Visual
    responsibilities: Gerar criativos estáticos, e gerenciar os templates HTML para posts de redes sociais baseados na identidade visual corporativa (Templates A ao F), utilizando image-creator e Canva skills.

  - id: daniel-desenvolvedor
    name: Daniel Desenvolvedor
    role: Engenheiro Frontend de Marketing
    responsibilities: Programar componentes TSX/Next.js, construir landing pages de alta performance otimizadas para carregamento/SEO, configurar tags do GA/GTM e implementar mecânicas de Testes A/B diretamente no código.

  - id: patricia-publicacao
    name: Patricia Publicação
    role: Operadora de Hub (Social Media / Publisher)
    responsibilities: Preparar automação de postagens, agendar crons, preencher hubs logísticos e garantir que a base de conhecimento do site bata com os disparos via Resend e redes.

  - id: bruno-bi
    name: Bruno BI
    role: Engenheiro de Growth e Monitoramento
    responsibilities: Vigiar conversão da LP, CTR dos posts, analisar resultados dos testes A/B programados pelo Daniel e munir a Aline com o funil matemático.

  - id: renata-revisao
    name: Renata Revisão
    role: Quality Assurance e Revisor Final
    responsibilities: Bater a régua antes de ir pro ar: validar legibilidade e erros nos posts HTML, aprovar pull-requests visuais do Daniel, testar LP e garantir coerência de marca completa.

pipeline:
  trigger: "Por comando manual (sprints quinzenais) ou disparo automático semanal de monitoramento de concorrentes / redes estruturadas"
  methodology: "Integração Contínua de Marketing - Pesquisa -> Estratégia -> Copy/Arte/Code -> QA -> Publicação -> Análise"
  deliverables:
    - "Dossiês de concorrentes e mapas de calor de palavras (SEO)"
    - "Calendário estruturado e scripts de vídeos/Posts"
    - "Peças e artes em .png geradas por motor de HTML"
    - "Pull requests e arquivos de página frontend otimizados pelo time técnico"
    - "Setup otimizado de emails e ferramentas Analytics"

skills_required:
  - image-creator
  - resend
  - blottato (para integração no painel)
  - run-command (para o Daniel Frontend editar arquivos Next.js)
