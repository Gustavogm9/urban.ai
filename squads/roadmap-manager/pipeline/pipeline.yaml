name: Linear Roadmap Pipeline
type: linear
steps:
  - id: inicio-sprint
    name: Inicio de Avaliação ou Sprint
    type: checkpoint
    message: O processo de revisão do roadmap começou. Analisando tarefas concluídas.

  - id: auditar-repositorio
    name: Auditar Código e Merge Requests
    agent: vitor-verificador
    task: auditar-repositorio.md

  - id: atualizar-roadmap
    name: Atualizar Roadmap Local
    agent: ricardo-roadmap
    task: atualizar-roadmap.md

  - id: documentar
    name: Atualizar Documentação Técnica
    agent: daniela-documentacao
    task: redigir-documentacao-tecnica.md

  - id: revisar-ciclo
    name: Revisão Holística de Qualidade
    agent: rute-revisao
    task: revisar-ciclo-completo.md

  - id: aprovacao-final
    name: Conclusão do Ciclo de Atualização
    type: checkpoint
    message: Todos os documentos técnicos e o roadmap foram revisados com base nas evidências de código. Ciclo encerrado.
