<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,600&family=Inter:wght@400;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1080px; height: 1440px; overflow: hidden; background: #FFFFFF; font-family: 'Inter', sans-serif; color: #0F172A; }
  </style>
</head>
<body>
  <div style="padding: 100px; height: 100%; display: flex; flex-direction: column; justify-content: center; position: relative;">
    <!-- Quote marks background decoration -->
    <div style="position: absolute; top: 120px; left: 80px; font-size: 400px; color: #F1F5F9; font-family: 'Playfair Display', serif; line-height: 1; z-index: 0;">"</div>
    
    <div style="position: relative; z-index: 1;">
      <!-- Stars -->
      <div style="display: flex; gap: 12px; margin-bottom: 50px;">
        <svg fill="#F59E0B" width="48" height="48" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        <svg fill="#F59E0B" width="48" height="48" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        <svg fill="#F59E0B" width="48" height="48" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        <svg fill="#F59E0B" width="48" height="48" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        <svg fill="#F59E0B" width="48" height="48" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      </div>

      <!-- Testimonial -->
      <h1 style="font-family: 'Playfair Display', serif; font-size: 64px; font-weight: 600; font-style: italic; color: #0F172A; line-height: 1.3; margin-bottom: 80px;">
        "Depois que ativei a Urban AI, percebi que estava deixando dinheiro na mesa todo fim de semana. Meu faturamento subiu 35% nos primeiros dois meses."
      </h1>

      <!-- Customer details -->
      <div style="display: flex; align-items: center; gap: 32px;">
        <div style="width: 120px; height: 120px; border-radius: 50%; background: #CBD5E1; border: 4px solid #3B82F6;"></div>
        <div>
          <div style="font-size: 38px; font-weight: 700; color: #1E293B; margin-bottom: 8px;">Carlos M.</div>
          <div style="font-size: 28px; font-weight: 600; color: #64748B;">Anfitrião de 3 Imóveis no Airbnb</div>
        </div>
      </div>
    </div>
    
    <div style="position: absolute; bottom: 80px; right: 80px; display: flex; align-items: center; gap: 16px;">
      <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg, #3B82F6, #10B981);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px;">U</div>
      <span style="font-size: 26px; font-weight: 700; color: #3B82F6;">Urban AI</span>
    </div>
  </div>
</body>
</html>
