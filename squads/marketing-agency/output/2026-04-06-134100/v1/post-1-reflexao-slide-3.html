<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Inter:wght@400;500;700;800&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1080px; height: 1440px; overflow: hidden; background: #070B14; }
    
    .glass-card {
      background: rgba(13, 30, 58, 0.4);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(59, 130, 246, 0.2);
      border-radius: 32px;
      padding: 60px;
    }
  </style>
</head>
<body>
<div style="width:1080px;height:1440px;background:#0A0F1D;color:#E2E8F0;font-family:'Inter',sans-serif;display:flex;flex-direction:column;padding:72px;position:relative;overflow:hidden; justify-content: center;">
  
  <div style="margin-bottom:auto; display:flex; gap: 20px; align-items:center;">
    <div style="font-family:'Montserrat',sans-serif; font-weight:900; font-size:32px; color:#fff;">URBAN AI</div>
    <div style="height: 2px; width: 60px; background: #3B82F6;"></div>
  </div>

  <div class="glass-card" style="margin-top: -100px; display:flex; flex-direction:column; align-items:center; text-align:center;">
    
    <div style="font-size:55px;line-height:1.3;font-weight:700;font-family:'Inter', sans-serif;max-width:850px;">
      O pior pesadelo da gestão profissional não é a agenda vazia.
    </div>

    <div style="width: 100%; height: 2px; background: linear-gradient(90deg, transparent, rgba(59,130,246,0.3), transparent); margin: 60px 0;"></div>

    <div style="font-size:50px;line-height:1.45;font-weight:700;color:#3B82F6; max-width: 850px; text-transform:uppercase; letter-spacing:2px; font-family:'Montserrat', sans-serif;">
      É lotar cobrando o piso de um mercado que estava disposto a pagar o triplo.
    </div>
  </div>

  <div style="margin-top:auto; display:flex; justify-content: space-between; align-items:center;">
    <div style="color:#64748b; font-size: 24px; font-weight: 500;">Veja nossa solução na página &rarr;</div>
    <div style="color:#64748b; font-size: 24px; font-weight: 500;">03/03</div>
  </div>

</div>
</body>
</html>
