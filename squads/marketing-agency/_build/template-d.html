<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1080px; height: 1440px; overflow: hidden; background: #070B14; font-family: 'Inter', sans-serif; color: #fff; }
  </style>
</head>
<body>
  <div style="padding: 80px; height: 100%; display: flex; flex-direction: column;">
    <div style="text-align: center; margin-bottom: 60px;">
      <div style="color: #60A5FA; font-weight: 800; font-size: 32px; letter-spacing: 4px; text-transform: uppercase;">O Jeito Antigo vs O Futuro</div>
    </div>
    
    <div style="display: flex; gap: 40px; flex: 1;">
      <!-- Old Way -->
      <div style="flex: 1; background: #181111; border: 2px solid #3F1515; border-radius: 32px; padding: 50px; display: flex; flex-direction: column; gap: 40px;">
        <h2 style="color: #F87171; font-size: 45px; font-weight: 800; text-align: center; border-bottom: 2px solid #3F1515; padding-bottom: 30px;">Precificação Manual</h2>
        <div style="font-size: 34px; color: #FDA4A4; font-weight: 600; display: flex; align-items: start; gap: 20px;">
          <span style="color: #F87171;">✕</span> Fixar preço no fim de semana
        </div>
        <div style="font-size: 34px; color: #FDA4A4; font-weight: 600; display: flex; align-items: start; gap: 20px;">
          <span style="color: #F87171;">✕</span> Ignorar eventos locais
        </div>
        <div style="font-size: 34px; color: #FDA4A4; font-weight: 600; display: flex; align-items: start; gap: 20px;">
          <span style="color: #F87171;">✕</span> Ocupação alta, mas lucro baixo
        </div>
      </div>

      <!-- New Way -->
      <div style="flex: 1; background: linear-gradient(180deg, #0D1E3A, #061022); border: 2px solid #1E3A8A; border-radius: 32px; padding: 50px; display: flex; flex-direction: column; gap: 40px; box-shadow: 0 0 60px rgba(59, 130, 246, 0.15);">
        <h2 style="color: #60A5FA; font-size: 45px; font-weight: 800; text-align: center; border-bottom: 2px solid #1E3A8A; padding-bottom: 30px;">Urban AI</h2>
        <div style="font-size: 34px; color: #BFDBFE; font-weight: 600; display: flex; align-items: start; gap: 20px;">
          <span style="color: #60A5FA;">✓</span> Ajuste de tarifa por hora
        </div>
        <div style="font-size: 34px; color: #BFDBFE; font-weight: 600; display: flex; align-items: start; gap: 20px;">
          <span style="color: #60A5FA;">✓</span> Leitura de busca algorítmica
        </div>
        <div style="font-size: 34px; color: #BFDBFE; font-weight: 600; display: flex; align-items: start; gap: 20px;">
          <span style="color: #60A5FA;">✓</span> Lucro máximo na demanda alta
        </div>
      </div>
    </div>
    
    <div style="text-align: center; margin-top: 60px; font-size: 30px; color: #94A3B8;">
      Maximize o retorno do seu imóvel de forma automatizada.
    </div>
  </div>
</body>
</html>
